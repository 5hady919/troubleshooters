<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Troubleshooters</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {margin:0; padding:0; box-sizing:border-box;}
    body {font-family: Arial, sans-serif; color:#333;}

    nav {
      background:#1f2d3d;
      color:white;
      padding:15px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position: sticky;
      top: 0;
    }

    .logo {font-size:26px; font-weight:bold;}

    .menu a {
      color:white;
      text-decoration:none;
      margin-left:15px;
      padding:8px 15px;
      border-radius:6px;
      transition:.3s;
      cursor:pointer;
    }
    .menu a:hover {background:#27ae60;}

    .hero {
      background: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
      url("https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1600&q=80")
      center/cover no-repeat;
      height:90vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      padding:20px;
    }
    .hero h1 {font-size:55px; margin-bottom:15px;}
    .hero p {font-size:20px; margin-bottom:25px;}

    .btn {
      background:#27ae60;
      color:white;
      padding:14px 28px;
      font-size:18px;
      border-radius:8px;
      text-decoration:none;
      transition:.3s;
    }
    .btn:hover {background:#219150;}

    .services {
      padding:60px 20px;
      text-align:center;
      max-width:1100px;
      margin:auto;
    }
    .services h2 {margin-bottom:40px; font-size:32px;}

    .cards {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
    }
    .card {
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 4px 15px rgba(0,0,0,.1);
      width:260px;
    }

    footer {
      background:#1f2d3d;
      color:white;
      text-align:center;
      padding:25px;
      margin-top:40px;
    }
  </style>

  <script>
    function switchLang(lang) {
      document.querySelectorAll("[data-en]").forEach(el => {
        el.innerHTML = el.getAttribute("data-" + lang);
      });
      document.body.dir = (lang === "ar") ? "rtl" : "ltr";
    }
  </script>
</head>

<body>

<!-- Navbar -->
<nav>
  <div class="logo">Troubleshooters</div>
  <div class="menu">
    <a href="#services" data-en="Our Services" data-ar="خدماتنا">Our Services</a>
    <a href="https://calendar.app.google/MarC4AnYjB5Z1HPn6" target="_blank"
       data-en="Book Now" data-ar="احجز الآن">Book Now</a>
    <a onclick="switchLang('ar')">AR</a>
    <a onclick="switchLang('en')">EN</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <h1 data-en="Technical Support Made Easy" data-ar="الدعم الفني أصبح أسهل">Technical Support Made Easy</h1>
  <p data-en="Remote IT support for individuals and small businesses. First session FREE!"
     data-ar="دعم فني عن بُعد للأفراد والشركات الصغيرة. أول جلسة مجاناً!">
  </p>
  <a class="btn" href="https://calendar.app.google/MarC4AnYjB5Z1HPn6" target="_blank"
     data-en="Book Your Session" data-ar="احجز جلستك الآن">Book Your Session</a>
</section>

<!-- Services -->
<section id="services" class="services">
  <h2 data-en="Our Services" data-ar="خدماتنا">Our Services</h2>
  <div class="cards">
    <div class="card">
      <h3 data-en="Network Setup" data-ar="إعداد الشبكات">Network Setup</h3>
      <p data-en="Install and configure networks for stable connectivity."
         data-ar="تركيب وضبط الشبكات لضمان اتصال مستقر.">
      </p>
    </div>
    <div class="card">
      <h3 data-en="PC Troubleshooting" data-ar="حل مشاكل الكمبيوتر">PC Troubleshooting</h3>
      <p data-en="Diagnose and fix Windows and software issues."
         data-ar="تشخيص وحل مشاكل الويندوز والبرامج.">
      </p>
    </div>
    <div class="card">
      <h3 data-en="Servers & CCTV" data-ar="السيرفرات والكاميرات">Servers & CCTV</h3>
      <p data-en="Setup and manage servers, CCTV, and file sharing."
         data-ar="إعداد وإدارة السيرفرات والكاميرات وأنظمة المشاركة.">
      </p>
    </div>
  </div>
</section>

<footer>
  © 2026 Troubleshooters
</footer>

</body>
</html>
