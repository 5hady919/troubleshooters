<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>حجز جلسة Technical Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      text-align: center;
      padding: 40px;
      direction: rtl;
    }
    .card {
      background: white;
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 {
      color: #2c3e50;
    }
    p {
      color: #555;
      font-size: 18px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 18px;
      color: white;
      background: #27ae60;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }
    .btn:hover {
      background: #219150;
    }
    .free {
      color: #e74c3c;
      font-weight: bold;
      font-size: 20px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>💻 Technical Support</h1>
    <p>دعم فني عن بُعد للأفراد والشركات الصغيرة</p>

    <div class="free">🎁 أول جلسة مجاناً</div>

    <p>احجز موعدك الآن واختر الوقت المناسب لك</p>

    <a class="btn" href="https://calendar.app.google/MarC4AnYjB5Z1HPn6" target="_blank">
      احجز جلسة الآن
    </a>

    <p style="margin-top:20px; font-size:14px; color:#888;">
      سيتم إرسال رابط الجلسة لك بعد الحجز
    </p>
  </div>

</body>
</html>
